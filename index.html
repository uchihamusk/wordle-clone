<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wordle Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>WORDLE</h1>

<div id="timer"></div>

<div id="board"></div>
<div id="keyboard"></div>

<div id="popup" class="hidden">
  <div id="popup-content">
    <h2 id="popup-text"></h2>
    <p id="stats"></p>
    <p id="countdown"></p>
    <button onclick="copyResult()">Share</button>
    <button onclick="restart()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
