<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word Guess</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <header>
      <h1>WORDLE</h1>
      <div id="timer"></div>
    </header>

    <main>
      <div id="board"></div>
      <div id="keyboard"></div>
    </main>

  </div>

  <div id="popup" class="hidden">
    <div id="popup-content">
      <h2 id="popup-text"></h2>

      <div id="stats"></div>

      <p id="countdown"></p>

      <div class="popup-buttons">
        <button onclick="copyResult()">Share</button>
        <button onclick="restart()">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
